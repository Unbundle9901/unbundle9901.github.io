<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Pokemon Team Builder</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 40px 16px;
      background: #f0f4f8;
      font-family: Georgia, serif;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 20px;
      color: #333;
      letter-spacing: 1px;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 28px 32px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      text-align: center;
    }

    input {
      padding: 6px 10px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      padding: 6px 14px;
      font-size: 1rem;
      border: 1px solid #aaa;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
    }

    button:hover { background: #f0f0f0; }

    audio { margin: 10px 0; width: 100%; }

    select {
      padding: 5px;
      font-size: 0.9rem;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin: 4px;
    }

    #addBtn { margin-top: 12px; }

    hr { border: none; border-top: 1px solid #eee; margin: 24px 0; }

    .team-member {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
      text-align: left;
    }

    .team-member ul {
      list-style: disc;
      margin: 0;
      padding-left: 18px;
      font-size: 0.9rem;
      color: #444;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Pokémon Team Builder</h1>

    <label>Name or ID: <input type="text" id="pokeInput"/></label>
    <button id="findBtn">Find</button>

    <div id="pokeDisplay"></div>
    <button id="addBtn" style="display:none;">Add to Team</button>

    <hr/>
    <div id="team"></div>
  </div>

  <script>
    const cache = {};
    let currentPoke = null;

    document.getElementById('pokeInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('findBtn').click();
    });

    document.getElementById('findBtn').addEventListener('click', async () => {
      const query = document.getElementById('pokeInput').value.trim().toLowerCase();
      if (!query) return;

      document.getElementById('pokeDisplay').innerHTML = 'Loading...';
      document.getElementById('addBtn').style.display = 'none';
      currentPoke = null;

      try {
        if (!cache[query]) {
          const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${query}`);
          if (!res.ok) throw new Error('Not found');
          cache[query] = await res.json();
        }
        currentPoke = cache[query];
        renderPokemon(currentPoke);
        document.getElementById('addBtn').style.display = 'inline';
      } catch (e) {
        document.getElementById('pokeDisplay').innerHTML = 'Pokémon not found. Try another name or ID.';
      }
    });

    function renderPokemon(data) {
      const sprite = data.sprites?.front_default || '';
      const cry = data.cries?.latest || data.cries?.legacy || '';
      const moves = data.moves.map(m => m.move.name);
      const options = moves.map(m => `<option value="${m}">${m}</option>`).join('');

      let html = '';
      if (sprite) html += `<br><img src="${sprite}" alt="${data.name}" width="96"/><br>`;
      if (cry) html += `<audio controls src="${cry}"></audio>`;

      html += '<br>';
      for (let i = 0; i < 4; i++) {
        html += `<select id="move${i}">${options}</select>`;
        if (i === 1) html += '<br>';
      }

      document.getElementById('pokeDisplay').innerHTML = html;
    }

    document.getElementById('addBtn').addEventListener('click', () => {
      if (!currentPoke) return;

      const sprite = currentPoke.sprites?.front_default || '';
      const moves = [];
      for (let i = 0; i < 4; i++) {
        moves.push(document.getElementById(`move${i}`).value);
      }

      const row = document.createElement('div');
      row.className = 'team-member';
      row.innerHTML = `
        ${sprite ? `<img src="${sprite}" alt="${currentPoke.name}" width="64"/>` : ''}
        <ul>${moves.map(m => `<li>${m}</li>`).join('')}</ul>
      `;
      document.getElementById('team').appendChild(row);
    });
  </script>
</body>
</html>
